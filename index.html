const ALL_KEYS = Object.keys(PRODUCTS);

function calcMeter(foasztalFo, hatterMeter) {
  const fF = parseInt(foasztalFo) || 0;
  const h = parseFloat(hatterMeter) || 0;
  const c = fF > 0 ? Math.max(3, Math.ceil(3 + Math.max(0, fF - 4) * 0.7)) : 3;
  return h > 0 ? Math.ceil(h) : c;
}

function buildAutoItems({ vendeg, asztalTipus, asztalDb, foasztalFo, menuTipus, szekTipus, vanHatter, hatterMeter, asztalHossz }) {
  const v = parseInt(vendeg) || 0;
  const a = parseInt(asztalDb) || (v ? Math.ceil(v / 10) : 0);
  const fF = parseInt(foasztalFo) || 0;
  const items = [];
  if (v > 0) {
    items.push({ key: szekTipus || "szekszoknyaColorSpandex", qty: v, rule: v + " vendég" });
    items.push({ key: "szalveta", qty: v, rule: v + " vendég" });
    items.push({ key: "uletoKartya", qty: v, rule: v + " vendég" });
  }
  if (a > 0) {
    items.push({ key: "asztalszam", qty: a, rule: a + " asztal" });
    items.push({ key: "asztalszamTarto", qty: a, rule: a + " asztal" });
    items.push({ key: "szorокristaly", qty: a, rule: a + " asztal" });
    items.push({ key: "vaza", qty: a, rule: a + " asztal" });
    items.push({ key: "vazafeny", qty: a, rule: a + " váza" });
    items.push({ key: "tukorlap", qty: a, rule: a + " asztal" });
    // Borosüveg fény: körasztalnál 1/asztal, hosszúnál 1/10 fő
    if (asztalTipus === "kor") {
      items.push({ key: "borosuvegFeny", qty: a, rule: a + " körasztal" });
    } else {
      const bFenyQty = v > 0 ? Math.ceil(v / 10) : a;
      items.push({ key: "borosuvegFeny", qty: bFenyQty, rule: v + " vendég ÷ 10" });
    }
    if (asztalTipus === "kor") {
      items.push({ key: "asztaliFluto", qty: a, rule: a + " körasztal" });
    } else {
      const fDb = v > 0 ? Math.ceil(v / 6) : a;
      items.push({ key: "asztaliFluto", qty: fDb, rule: v + " vendég ÷ 6" });
    }
    if (menuTipus !== "nincs") {
      const menuKey = menuTipus === "henger" ? "menuHenger" : "menuHaromszog";
      let mQty = asztalTipus === "kor" ? a : Math.ceil(v / 10);
      const foE = fF > 4 ? 2 : 0;
      mQty += foE;
      items.push({ key: menuKey, qty: mQty, rule: (asztalTipus === "kor" ? a + " asztal" : v + "÷10") + (foE ? " +" + foE + " főasztal" : "") });
    }
  }
  // Hosszú asztal terítő számítás
  if (asztalTipus === "hosszu" && a > 0) {
    const h = parseInt(asztalHossz) || 170;
    const ossz = h * a;
    const terDb = Math.ceil(ossz / 140);
    items.push({ key: "feherAsztalterito", qty: terDb, rule: a + " asztal × " + h + "cm ÷ 140cm = " + terDb + " db" });
  }

  if (vanHatter) {
    const meter = calcMeter(foasztalFo, hatterMeter);
    items.push({ key: "hatterSima3m", qty: meter, rule: meter + "m (" + (fF > 0 ? fF + " főasztal fő" : "min 3m") + ")" });
    items.push({ key: meter <= 5 ? "hatterFeny1" : "hatterFeny2", qty: 1, rule: meter + "m → fény" });
  }
  return items;
}

const btn = (bg, color, extra) => Object.assign({ border: "none", borderRadius: 10, fontFamily: "Georgia,serif", fontWeight: 700, cursor: "pointer", background: bg, color: color }, extra || {});

// ── Mini toggle csúszka ──
function MiniToggle({ on, onToggle }) {
  return e("div", { onClick: onToggle, style: { width: 32, height: 18, borderRadius: 9, background: on ? G : "#ddd", position: "relative", cursor: "pointer", flexShrink: 0, transition: "background 0.2s" } },
    e("div", { style: { width: 14, height: 14, borderRadius: "50%", background: "white", position: "absolute", top: 2, left: on ? 16 : 2, transition: "left 0.2s" } })
  );
}

// ── Felirat ──
function Lbl({ children, sub }) {
  return e("div", { style: { marginBottom: 5 } },
    e("div", { style: { fontSize: "0.68rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#888" } }, children),
    sub ? e("div", { style: { fontSize: "0.65rem", color: "#bbb", marginTop: 1 } }, sub) : null
  );
}

// ── Toggle 3 gomb ──
function Toggle3({ value, onChange, options }) {
  return e("div", { style: { display: "flex", gap: 7 } },
    ...options.map(([v, icon, label]) =>
      e("button", { key: v, onClick: () => onChange(v), style: { flex: 1, padding: "8px 4px", border: "2px solid " + (value === v ? G : BORDER), background: value === v ? DARK : "white", color: value === v ? G : "#aaa", borderRadius: 8, cursor: "pointer", fontFamily: "Georgia,serif", fontSize: "0.78rem", fontWeight: value === v ? 700 : 400, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 } },
        e("span", { style: { fontSize: "1.1rem" } }, icon), label
      )
    )
  );
}

// ── Switch ──
function Sw({ on, onChange, label, sub }) {
  return e("div", { onClick: () => onChange(!on), style: { display: "flex", alignItems: "center", gap: 11, padding: "10px 13px", border: "2px solid " + (on ? G : BORDER), borderRadius: 10, cursor: "pointer", background: on ? "rgba(201,168,76,0.06)" : "white" } },
    e("div", { style: { width: 36, height: 20, borderRadius: 10, background: on ? G : "#ddd", position: "relative", flexShrink: 0 } },
      e("div", { style: { width: 16, height: 16, borderRadius: "50%", background: "white", position: "absolute", top: 2, left: on ? 18 : 2, transition: "left 0.2s" } })
    ),
    e("div", null,
      e("div", { style: { fontWeight: 700, color: DARK, fontSize: "0.87rem" } }, label),
      sub ? e("div", { style: { fontSize: "0.68rem", color: "#aaa", marginTop: 1 } }, sub) : null
    )
  );
}

// ── Mennyiség input ──
function QtyInput({ value, onChange, small }) {
  const w = small ? 36 : 42, bw = small ? 20 : 21;
  const bStyle = { width: bw, height: bw, border: "1px solid " + BORDER, background: "white", borderRadius: 4, cursor: "pointer", fontSize: "0.88rem", color: DARK, fontWeight: 700 };
  return e("div", { style: { display: "flex", alignItems: "center", gap: 3 } },
    e("button", { onClick: () => onChange(Math.max(1, (parseInt(value) || 1) - 1)), style: bStyle }, "−"),
    e("input", { type: "number", value, min: 1,
      onChange: ev => { const v = ev.target.value; if (v === "" || v === "0") { onChange(""); return; } const n = parseInt(v); if (!isNaN(n) && n >= 1) onChange(n); },
      onBlur: ev => { if (!ev.target.value || parseInt(ev.target.value) < 1) onChange(1); },
      style: { width: w, border: "1px solid " + BORDER, borderRadius: 4, padding: "2px 3px", textAlign: "center", fontFamily: "Georgia,serif", fontSize: "0.83rem", color: DARK, background: CREAM }
    }),
    e("button", { onClick: () => onChange((parseInt(value) || 1) + 1), style: bStyle }, "+")
  );
}

// ── Auto tétel sor ──
function AutoRow({ item, on, onToggle, onQtyChange, isLast }) {
  const p = PRODUCTS[item.key]; if (!p) return null;
  return e("div", { style: { display: "flex", alignItems: "center", gap: 9, padding: "9px 14px", borderBottom: isLast ? "none" : "1px solid " + BORDER, background: on ? "white" : "#fafafa", opacity: on ? 1 : 0.42 } },
    e(MiniToggle, { on, onToggle }),
    e("div", { style: { flex: 1, minWidth: 0 } },
      e("div", { style: { fontSize: "0.84rem", fontWeight: 600, color: DARK, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, p.name),
      e("div", { style: { fontSize: "0.63rem", color: "#bbb" } }, item.rule)
    ),
    e(QtyInput, { value: item.qty, onChange: onQtyChange }),
    e("div", { style: { textAlign: "right", minWidth: 64, fontSize: "0.81rem", fontWeight: 700, color: on ? G : "#ccc" } }, fmt(p.price * (parseInt(item.qty) || 1)))
  );
}

// ── Extra tétel sor ──
function ExtraRow({ extraKey, state, onToggle, onQty }) {
  const p = PRODUCTS[extraKey]; if (!p) return null;
  const on = !!state.on;
  const qty = state.qty !== undefined ? state.qty : 1;
  return e("div", { style: { display: "flex", alignItems: "center", gap: 9, padding: "8px 12px", borderBottom: "1px solid " + BORDER, background: on ? "rgba(201,168,76,0.04)" : "white" } },
    e(MiniToggle, { on, onToggle }),
    e("div", { style: { flex: 1, minWidth: 0 } },

      p.m ? e("div", { style: { fontSize: "0.61rem", color: "#bbb" } }, "⚠️ " + p.m) : null
    ),

}

// ── FŐ APP ──
function App() {
  const [step, setStep] = useState(1);
  const [clientName, setClientName] = useState("");
  const [eventDate, setEventDate] = useState("");
  const [eventType, setEventType] = useState("");
  const [helyszin, setHelyszin] = useState("");
  const [szin, setSzin] = useState("");
  const [vendeg, setVendeg] = useState("");
  const [asztalTipus, setAsztalTipus] = useState("kor");
  const [asztalDb, setAsztalDb] = useState("");
  const [foasztalFo, setFoasztalFo] = useState("");
  const [menuTipus, setMenuTipus] = useState("henger");
  const [szekTipus, setSzekTipus] = useState("szekszoknyaColorSpandex");
  const [vanHatter, setVanHatter] = useState(false);
  const [hatterMeter, setHatterMeter] = useState("");
  const [asztalHossz, setAsztalHossz] = useState("");
  const [autoState, setAutoState] = useState({});
  const [extraState, setExtraState] = useState({});
  const [openCats, setOpenCats] = useState({});
  const [inputMode, setInputMode] = useState("foto");
  const [imageB64, setImageB64] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [imageMediaType, setImageMediaType] = useState("image/jpeg");
  const [textInput, setTextInput] = useState("");
  const [fileError, setFileError] = useState("");
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("kasmir_api_key") || ""; } catch { return ""; }
  });
  const [showSettings, setShowSettings] = useState(false);
  const [apiKeySaved, setApiKeySaved] = useState(false);
  const [loading, setLoading] = useState(false);
  const [aiSummary, setAiSummary] = useState("");
  const [items, setItems] = useState([]);
  const [quoteNum, setQuoteNum] = useState("");
  const [addKey, setAddKey] = useState(ALL_KEYS[0]);
  const [addQty, setAddQty] = useState(1);
  const fileRef = useRef();

  const params = { vendeg, asztalTipus, asztalDb, foasztalFo, menuTipus, szekTipus, vanHatter, hatterMeter, asztalHossz };
  const rawAuto = buildAutoItems(params);
  const autoItems = rawAuto.map(it => ({
    ...it,
    on: autoState[it.key]?.on !== undefined ? autoState[it.key].on : true,
    qty: autoState[it.key]?.qty !== undefined ? autoState[it.key].qty : it.qty,
  }));
  const setAutoOn = (key, val) => setAutoState(p => ({ ...p, [key]: { ...p[key], on: val, qty: p[key]?.qty ?? rawAuto.find(i => i.key === key)?.qty ?? 1 } }));
  const setAutoQty = (key, val) => setAutoState(p => ({ ...p, [key]: { ...p[key], qty: val, on: p[key]?.on !== undefined ? p[key].on : true } }));
  const setExtra = (key, on, qty) => setExtraState(p => ({ ...p, [key]: { on, qty: qty ?? p[key]?.qty ?? 1 } }));
  const setExtraQty = (key, val) => setExtraState(p => ({ ...p, [key]: { ...p[key], qty: val } }));

  const extraItems = Object.entries(extraState).filter(([, v]) => v.on)
    .map(([key, v]) => ({ key, qty: parseInt(v.qty) || 1, note: "Extras", auto: false }));

  const handleFile = ev => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    if (!window.FileReader) {
      setFileError("A böngésző nem támogatja a fájlfeltöltést. Frissítsd Chrome-ot!");
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      setFileError("A fotó túl nagy (max 10 MB). Kérlek tömörítsd!");
      return;
    }
    setFileError("");
    setImageMediaType(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onerror = () => setFileError("Fotó olvasási hiba – próbálj másik képet.");
    reader.onload = e2 => {
      setImagePreview(e2.target.result);
      setImageB64(e2.target.result.split(",")[1]);
      setFileError("");
    };
    reader.readAsDataURL(file);
  };

  const buildFinalItems = (aiItems = []) => {
    const ea = autoItems.filter(it => it.on);
    return [...ea.map(i => ({ key: i.key, qty: i.qty, note: i.rule, auto: true })), ...extraItems, ...aiItems];
  };

  const generate = async (skipAI = false) => {
    setLoading(true); setItems([]); setAiSummary("");
    const ea = autoItems.filter(it => it.on);
    const fixed = [...ea.map(i => i.key), ...extraItems.map(i => i.key)];
    if (skipAI || (!imageB64 && !textInput.trim())) {
      setAiSummary("Ajánlat az adatok és a kiválasztott tételek alapján készült.");
      setItems(buildFinalItems());
      setQuoteNum("AJ-" + Date.now().toString().slice(-6));
      setStep(4); setLoading(false); return;
    }
    const productList = ALL_KEYS.filter(k => !fixed.includes(k))
      .map(k => k + ": " + PRODUCTS[k].name + " — " + PRODUCTS[k].price + " Ft/" + PRODUCTS[k].unit).join("\n");
    const system = "Te eseménydekorációs árajánlat-asszisztens vagy.\nElérhető termékek (csak ezekből):\n" + productList + "\nFixált tételek (NE add újra): " + (fixed.join(", ") || "nincs") + "\nElemezd a képet/leírást. Csak azt add hozzá, amit ténylegesen látsz/kérnek.\nHa fotófal látható: fotofal (1 db).\nVálaszolj CSAK JSON-nel: {\"summary\":\"2-3 mondatos magyar összefoglaló\",\"items\":[{\"key\":\"kulcs\",\"qty\":5}]}";
    let aiItems = [], summary = "";
    try {
      const userContent = inputMode === "foto"
        ? [{ type: "image", source: { type: "base64", media_type: imageMediaType, data: imageB64 } },
           { type: "text", text: "Vendégszám: " + (vendeg || "~50") + ". Asztal: " + (asztalTipus === "kor" ? "körasztal" : "hosszú asztal") + ", " + (asztalDb || "?") + " db. Főasztal: " + (foasztalFo || "?") + " fő. Szín: " + (szin || "?") + "." }]
        : [{ type: "text", text: "Leírás: " + textInput + "\nVendégszám: " + (vendeg || "~50") + "\nAsztal: " + (asztalTipus === "kor" ? "körasztal" : "hosszú asztal") + ", " + (asztalDb || "?") + " db\nFőasztal: " + (foasztalFo || "?") + " fő\nSzín: " + (szin || "?") }];
      const isLocal = window.location.protocol === "http:" && window.location.hostname === "localhost";
      const apiUrl = isLocal ? "/api/claude" : "https://api.anthropic.com/v1/messages";
      const currentKey = apiKey || (localStorage.getItem("kasmir_api_key") || "");
      const headers = isLocal
        ? { "Content-Type": "application/json" }
        : { "Content-Type": "application/json", "x-api-key": currentKey, "anthropic-version": "2023-06-01" };
      if (!isLocal && !currentKey) {
        setLoading(false);
        setShowSettings(true);
        return;
      }
      const res = await fetch(apiUrl, {
        method: "POST", headers,
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system, messages: [{ role: "user", content: userContent }] }),
      });
      const data = await res.json();
      const text = data.content?.map(c => c.text || "").join("") || "";
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        const parsed = JSON.parse(match[0]);
        summary = parsed.summary || "";
        aiItems = (parsed.items || []).filter(it => PRODUCTS[it.key] && !fixed.includes(it.key))
          .map(it => ({ key: it.key, qty: it.qty, note: "AI azonosította", auto: false }));
      }
    } catch { summary = "Az ajánlat az adatok alapján készült."; }
    setAiSummary(summary);
    setItems(buildFinalItems(aiItems));
    setQuoteNum("AJ-" + Date.now().toString().slice(-6));
    setStep(4); setLoading(false);
  };

  const changeQty = (i, val) => setItems(p => p.map((it, j) => j === i ? { ...it, qty: val } : it));
  const removeItem = i => setItems(p => p.filter((_, j) => j !== i));
  const addItem = () => setItems(p => {
    const ex = p.findIndex(it => it.key === addKey);
    if (ex >= 0) return p.map((it, j) => j === ex ? { ...it, qty: (parseInt(it.qty) || 0) + addQty } : it);
    return [...p, { key: addKey, qty: addQty, note: "Kézzel", auto: false }];
  });
  const total = items.reduce((s, it) => { const p = PRODUCTS[it.key]; return p ? s + p.price * (parseInt(it.qty) || 1) : s; }, 0);

  const exportExcel = async () => {
    try {
      const wb = XLSX.utils.book_new();
      const meta = [
        ["Kasmir Esküvő és Rendezvény – Árajánlat"],
        [quoteNum],
        [],
        ["Ügyfél", clientName || "–", "", "Helyszín", helyszin || "–"],

      ws["!cols"] = [{ wch: 42 }, { wch: 14 }, { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 22 }];

        const ws2 = await fh.createWritable();

        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        // Ha a letöltés nem indul el automatikusan, új lapon nyitjuk meg

      }

      doc.autoTable({

        styles: { font: "helvetica", fontSize: 8, cellPadding: 3, textColor: dark, lineColor: [240, 235, 230], lineWidth: 0.2 },

        margin: { left: 14, right: 14 },

      doc.setDrawColor(...gold);
      doc.setLineWidth(0.8);
      doc.line(14, finalY, W - 14, finalY);
      doc.setFillColor(...gold);
      doc.rect(14, finalY + 1, W - 28, 10, "F");
      doc.setTextColor(...dark);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.text("Vegoszszeg", 18, finalY + 7.5);

        setTimeout(() => { if (document.hasFocus()) window.open(pdfData, "_blank"); }, 800);

        ),
        e("button", { onClick: () => setShowSettings(s => !s), title: "API kulcs beállítása", style: { width: 28, height: 28, borderRadius: "50%", border: "none", background: apiKey ? "rgba(201,168,76,0.3)" : "rgba(255,100,100,0.3)", color: apiKey ? G : "#ff9999", cursor: "pointer", fontSize: "0.9rem", display: "flex", alignItems: "center", justifyContent: "center", marginLeft: 4 } }, "⚙️")
      )
    ),

      e("div", { style: { background: "white", borderRadius: 16, padding: "28px 24px", width: "100%", maxWidth: 420, boxShadow: "0 20px 60px rgba(0,0,0,0.4)" } },

          "💡 API kulcs nélkül is használható az app — csak az AI fotóelemzés nem működik. Az auto tételek, extras, Excel és PDF letöltés mind elérhető."

                      e("input", { type: "number", value: it.qty, min: 1, onChange: ev => { const v = ev.target.value; if (v === "" || v === "0") { changeQty(i, ""); return; } const n = parseInt(v); if (!isNaN(n) && n >= 1) changeQty(i, n); }, onBlur: ev => { if (!ev.target.value || parseInt(ev.target.value) < 1) changeQty(i, 1); }, style: { width: 38, border: "1px solid " + BORDER, borderRadius: 4, padding: "2px 3px", textAlign: "center", fontFamily: "Georgia,serif", fontSize: "0.82rem", color: DARK, background: CREAM } }),
                      e("button", { onClick: () => changeQty(i, (parseInt(it.qty) || 1) + 1), style: { width: 20, height: 20, border: "1px solid " + BORDER, background: "white", borderRadius: 4, cursor: "pointer", fontSize: "0.85rem", color: DARK, fontWeight: 700 } }, "+")
                    )
                  ),
                  e("td", { style: { padding: "8px 6px", textAlign: "right", fontWeight: 700, color: DARK, fontSize: "0.85rem", whiteSpace: "nowrap" } }, fmt(p.price * (parseInt(it.qty) || 1))),
                  e("td", { style: { padding: "8px 4px", textAlign: "right" } },
                    e("button", { onClick: () => removeItem(i), style: { background: "none", border: "none", color: "#ddd", cursor: "pointer", fontSize: "0.9rem" } }, "✕")
                  )
                );
              })
            )
          ),

          e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 6px", borderTop: "2px solid " + G, marginTop: 4 } },
            e("span", { style: { fontSize: "0.98rem", fontWeight: 700, color: DARK } }, "Végösszeg"),
            e("span", { style: { fontSize: "1.45rem", fontWeight: 700, color: G } }, fmt(total))
          ),

          // Kézi hozzáadás
          e("div", { style: { marginTop: 13, padding: "12px 13px", background: WARM, borderRadius: 10, border: "1px solid " + BORDER } },
            e("div", { style: { fontSize: "0.62rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#aaa", marginBottom: 6 } }, "+ Tétel kézi hozzáadása"),
            e("div", { style: { display: "flex", gap: 7 } },
              e("select", { value: addKey, onChange: ev => setAddKey(ev.target.value), style: { flex: 1, border: "1.5px solid " + BORDER, borderRadius: 7, padding: "7px 8px", fontFamily: "Georgia,serif", fontSize: "0.75rem", background: "white", color: DARK } },
                ...ALL_KEYS.map(k => e("option", { key: k, value: k }, PRODUCTS[k].name + " — " + PRODUCTS[k].price.toLocaleString("hu-HU") + " Ft"))
              ),
              e("input", { type: "number", value: addQty, min: 1, onChange: ev => setAddQty(Math.max(1, Number(ev.target.value))), style: { width: 52, border: "1.5px solid " + BORDER, borderRadius: 7, padding: "7px 5px", fontFamily: "Georgia,serif", fontSize: "0.88rem", background: "white", color: DARK, textAlign: "center" } }),
              e("button", { onClick: addItem, style: { padding: "7px 12px", background: DARK, border: "none", borderRadius: 7, cursor: "pointer", fontSize: "0.81rem", fontFamily: "Georgia,serif", color: G, fontWeight: 700 } }, "+ Add")
            )
          ),

          e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginTop: 9 } },
            e("button", { onClick: printQuote, style: { padding: "11px", background: DARK, color: G, border: "none", borderRadius: 10, fontFamily: "Georgia,serif", fontSize: "0.88rem", cursor: "pointer", fontWeight: 700 } }, "⬇️ Letöltés PDF (.pdf)"),
            e("button", { onClick: exportExcel, style: { padding: "11px", background: "#1a4d2a", color: "#7dcea0", border: "none", borderRadius: 10, fontFamily: "Georgia,serif", fontSize: "0.88rem", cursor: "pointer", fontWeight: 700 } }, "📊 Letöltés Excel (.xlsx)")
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
